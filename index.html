<!doctype html>
<html lang="en">

<head>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Student Game Gallery</title>

  <style>
   body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at 20% 20%, #dfe7ff, transparent 40%),
              radial-gradient(circle at 80% 70%, #ffe6d9, transparent 40%),
              #f6f4ef;
  margin: 0;
  padding: 40px 20px;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
}

h1 {
  text-align: center;
  font-size: 42px;
  margin-bottom: 8px;
}

.subtitle {
  text-align: center;
  color: #666;
  margin-bottom: 32px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}

.card {
  background: white;
  border: none;
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  border-radius: 10px;
  display: block;
}

.title {
  font-size: 22px;
  font-weight: bold;
  margin: 0 0 6px;
}

.meta {
  color: #666;
  margin-bottom: 14px;
}

.button {
  display: inline-block;
  background: #222;
  color: white;
  text-decoration: none;
  padding: 10px 16px;
  border-radius: 10px;
}
  </style>

</head>

<body>

  <h1 style="font-size: 48px;"><center>Student Game Gallery</center></h1>
  <p><center>Click "Play" to begin</center></p>

  <div class="grid">
    <div class="card">
      <img src="m_screenshot.png" alt="Raptors screenshot" class="thumb">
      <p class="title">Mariano - Godot 2D Game</p>
      <p class="meta">Use arrow keys to move</p>
      <a class="button" href="https://aroble11.github.io/raptors_mariano/">Play</a>
    </div>

    <div class="card">
      <img src="h_screenshot.png" alt="Raptors screenshot" class="thumb">
      <p class="title">David - Godot 2D Game</p>
      <p class="meta">Use arrow keys to move</p>
      <a class="button" href="https://aroble11.github.io/raptors_david/">Play</a>
    </div>

    <div class="card">
      <img src="a_screenshot.png" alt="Raptors screenshot" class="thumb">
      <p class="title">Aliyah - Godot 2D Game</p>
      <p class="meta">Use arrow keys to move</p>
      <a class="button" href="https://aroble11.github.io/raptors_aliyah/">Play</a>
    </div>

    <div class="card">
      <img src="l_screenshot.png" alt="Raptors screenshot" class="thumb">
      <p class="title">Leo - Godot 2D Game</p>
      <p class="meta">Use arrow keys to move</p>
      <a class="button" href="https://aroble11.github.io/raptors_leo/">Play</a>
    </div>
  </div>

</body>

</html>
